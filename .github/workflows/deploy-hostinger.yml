name: Deploy Hostinger Production

# On-demand production deploy (Actions → this workflow → "Run workflow").
#
# Path that actually injects env (see docs/infra/HOSTINGER_DEPLOYMENT.md): the
# Hostinger Docker Manager only feeds the `environment` payload into compose
# ${VAR} interpolation when it CLONES a git repo (it writes a .env the compose
# reads). The raw-URL/gist path does NOT — the api then comes up with an empty
# env. So this workflow:
#   1. builds + pushes the 4 images to GHCR (public packages),
#   2. deploys by pointing the Docker Manager at docker-compose.hostinger.registry.yml
#      (a no-build companion that PULLS those images) via a repo blob URL at the
#      deployed SHA, so the manager clones, writes .env, and pulls — no VPS build.
#
# Requires the repo to be cloneable by the VPS at the deployed SHA (public repo,
# or working Docker Manager git creds). The compose exposes only service names,
# image refs, and env var NAMES — never values.

on:
  workflow_dispatch:
    inputs:
      apply_migrations:
        description: >-
          Comma-separated idempotent migration filenames to apply on deploy
          (e.g. 0105_atlas_tool_sessions.sql). Leave blank to skip. Runs the
          one-shot `migrate` service against the DB from the VPS.
        required: false
        default: ""
  # Uncomment to auto-deploy on every push to the launch branch:
  # push:
  #   branches: [chore/368-launch-readiness-ishantech]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Build, push to GHCR, and deploy via clone
    runs-on: ubuntu-latest
    environment: production
    env:
      REGISTRY: ghcr.io
      OWNER: venkateshbr
      TAG: ${{ github.sha }}
      HEALTH_URL: ${{ vars.HOSTINGER_APP_HEALTH_URL || 'https://aethos.ishirock.tech/health/ready' }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Verify config
        run: |
          set -euo pipefail
          [ -n "${{ vars.HOSTINGER_PROJECT_NAME }}" ] || { echo "set var HOSTINGER_PROJECT_NAME (aethos-ps)"; exit 1; }
          [ -n "${{ vars.HOSTINGER_VM_ID }}" ] || { echo "set var HOSTINGER_VM_ID (1695814)"; exit 1; }
          [ -n "${{ secrets.HOSTINGER_API_KEY }}" ] || { echo "set secret HOSTINGER_API_KEY"; exit 1; }
          [ -n "${{ secrets.AETHOS_PRODUCTION_ENV }}" ] || { echo "set secret AETHOS_PRODUCTION_ENV"; exit 1; }

      - name: Registry compose is in sync with the base compose
        run: |
          set -euo pipefail
          python scripts/deploy/gen-registry-compose.py
          if ! git diff --exit-code docker-compose.hostinger.registry.yml; then
            echo "::error::docker-compose.hostinger.registry.yml is out of sync with docker-compose.hostinger.yml."
            echo "Run 'python scripts/deploy/gen-registry-compose.py' and commit the result."
            exit 1
          fi

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin

      - name: Build and push images
        run: |
          set -euo pipefail
          REG="$REGISTRY/$OWNER"
          bp() { docker build -t "$REG/$1:$TAG" -f "$2/$3" "$2"; docker push "$REG/$1:$TAG"; }
          bp aethos-ps-api       backend             Dockerfile
          bp aethos-ps-frontend  frontend            Dockerfile.prod
          bp aethos-ps-hermes    integrations/hermes Dockerfile
          bp aethos-ps-timesheet frontend            Dockerfile.timesheet.prod

      - name: Deploy to Hostinger via repo clone (registry compose, no VPS build)
        env:
          KEY: ${{ secrets.HOSTINGER_API_KEY }}
          VM: ${{ vars.HOSTINGER_VM_ID }}
          PROJECT: ${{ vars.HOSTINGER_PROJECT_NAME }}
          APPLY_MIGRATIONS: ${{ inputs.apply_migrations }}
        run: |
          set -euo pipefail
          # When migrations are requested, add the one-shot `migrate` profile so
          # the applier runs against the DB from the VPS.
          PROFILES="${{ vars.COMPOSE_PROFILES || 'worker,hermes' }}"
          if [ -n "${APPLY_MIGRATIONS:-}" ]; then PROFILES="$PROFILES,migrate"; fi
          # Assemble the container env: the prod secret + deploy overrides. The
          # Hostinger API rejects DUPLICATE keys (422), so dedupe with the later
          # (override) value winning while preserving first-seen order.
          RAWENV="$(mktemp)"; ENVFILE="$(mktemp)"
          {
            printf '%s\n' "${{ secrets.AETHOS_PRODUCTION_ENV }}"
            echo "DEBUG=false"
            echo "ENVIRONMENT=production"
            echo "FRONTEND_BASE_URL=https://aethos.ishirock.tech"
            echo "CORS_ORIGINS=https://aethos.ishirock.tech,https://timesheet.aethos.ishirock.tech"
            echo "HOSTINGER_APP_DOMAIN=aethos.ishirock.tech"
            echo "HOSTINGER_TIMESHEET_DOMAIN=timesheet.aethos.ishirock.tech"
            echo "TRAEFIK_ENTRYPOINT=${{ vars.TRAEFIK_ENTRYPOINT || 'websecure' }}"
            echo "TRAEFIK_CERT_RESOLVER=${{ vars.TRAEFIK_CERT_RESOLVER || 'letsencrypt' }}"
            echo "COMPOSE_PROFILES=$PROFILES"
            echo "APPLY_MIGRATIONS=${APPLY_MIGRATIONS:-}"
            echo "AETHOS_IMAGE_TAG=$TAG"
          } > "$RAWENV"
          # Dedupe: last (override) value wins, first-seen order preserved.
          awk '{
                 line=$0; eq=index(line,"=")
                 if (line ~ /^[[:space:]]*#/ || line ~ /^[[:space:]]*$/ || eq==0) next
                 key=substr(line,1,eq-1); val=substr(line,eq+1)
                 if (!(key in seen)) order[++n]=key
                 seen[key]=val
               }
               END { for (i=1;i<=n;i++) print order[i]"="seen[order[i]] }' "$RAWENV" > "$ENVFILE"
          dupes="$(cut -d= -f1 "$ENVFILE" | sort | uniq -d || true)"
          [ -z "$dupes" ] || { echo "::error::duplicate env keys after dedupe: $dupes"; exit 1; }

          CONTENT="https://github.com/${{ github.repository }}/blob/$TAG/docker-compose.hostinger.registry.yml"
          echo "Deploying $CONTENT (tag=$TAG)"
          BODY="$(jq -n --arg pn "$PROJECT" --arg content "$CONTENT" --rawfile env "$ENVFILE" \
            '{project_name:$pn, content:$content, environment:$env}')"
          HTTP="$(curl -s -o /tmp/resp.json -w '%{http_code}' -X POST \
            -H "Authorization: Bearer $KEY" -H "Content-Type: application/json" -d "$BODY" \
            "https://developers.hostinger.com/api/vps/v1/virtual-machines/$VM/docker")"
          cat /tmp/resp.json; echo
          [ "$HTTP" = "200" ] || { echo "::error::deploy POST returned $HTTP"; exit 1; }

      - name: Verify the new build is live and healthy
        env:
          KEY: ${{ secrets.HOSTINGER_API_KEY }}
          VM: ${{ vars.HOSTINGER_VM_ID }}
        run: |
          set -euo pipefail
          # /health/ready confirms BOTH that the new code is live (build_sha) AND
          # that env injected (status:ready needs a real DB/queue connection).
          for i in $(seq 1 40); do
            J="$(curl -s --max-time 20 "$HEALTH_URL" || true)"
            STATUS="$(printf '%s' "$J" | jq -r '.status // ""' 2>/dev/null || true)"
            SHA="$(printf '%s' "$J" | jq -r '.build_sha // ""' 2>/dev/null || true)"
            echo "[$((i*15))s] status=$STATUS build_sha=$SHA"
            if [ "$STATUS" = "ready" ] && [ "$SHA" = "$TAG" ]; then
              echo "OK: new build is live and ready"; exit 0
            fi
            sleep 15
          done
          echo "::error::new build not ready after 10m — dumping build log:"
          BASE="https://developers.hostinger.com/api/vps/v1/virtual-machines/$VM/docker"
          curl -s -H "Authorization: Bearer $KEY" "$BASE/${{ vars.HOSTINGER_PROJECT_NAME }}/logs" \
            | jq -r '.[] | select(.service|test("build";"i")) | .entries[].line' | tail -40 || true
          exit 1

      - name: Confirm migrations applied (surface migrate logs)
        # Runs whenever migrations were requested, even if the health check above
        # failed — a silently-failed migration is exactly what we want to catch.
        if: ${{ always() && inputs.apply_migrations != '' }}
        env:
          KEY: ${{ secrets.HOSTINGER_API_KEY }}
          VM: ${{ vars.HOSTINGER_VM_ID }}
          PROJECT: ${{ vars.HOSTINGER_PROJECT_NAME }}
          APPLY_MIGRATIONS: ${{ inputs.apply_migrations }}
        run: |
          set -uo pipefail
          # The one-shot `migrate` service runs on the VPS, so its stdout never
          # reaches this runner. Nothing depends on it and the health check only
          # probes `api`, so a failed applier would still leave the deploy green.
          # Pull its logs from the Hostinger docker logs API and assert success.
          BASE="https://developers.hostinger.com/api/vps/v1/virtual-machines/$VM/docker"
          LINES=""
          for i in $(seq 1 12); do
            LINES="$(curl -s -H "Authorization: Bearer $KEY" "$BASE/$PROJECT/logs" \
              | jq -r '.[] | select((.service // "")|test("migrate";"i")) | .entries[].line' 2>/dev/null || true)"
            printf '%s\n' "$LINES" | grep -q 'apply_migrations: done' && break
            sleep 10
          done
          echo "----- migrate service logs (APPLY_MIGRATIONS=$APPLY_MIGRATIONS) -----"
          printf '%s\n' "$LINES"
          echo "----------------------------------------------------------------"
          if printf '%s\n' "$LINES" | grep -qiE 'Traceback|not found|not set|ERROR'; then
            echo "::error::migrate service reported a failure — migration NOT applied"; exit 1
          fi
          if printf '%s\n' "$LINES" | grep -q 'apply_migrations: done'; then
            echo "OK: migrate service reported 'apply_migrations: done'"; exit 0
          fi
          echo "::warning::could not confirm migration from migrate logs (one-shot container may have been pruned / log retention). Verify manually via Supabase REST — see docs/infra."
