name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  vercel-preview:
    name: Vercel preview deploy
    runs-on: ubuntu-latest
    # Job-level `if` cannot read the job's `env` block or repository secrets.
    # Opt in only after the Vercel secrets and this repository variable exist.
    if: ${{ vars.VERCEL_PREVIEW_ENABLED == 'true' }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Comment — preview deploy triggered
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "Preview deploy triggered. Vercel will post the URL once the build completes."

