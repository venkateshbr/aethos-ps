<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 80" role="img" aria-label="Aethos, for professional services">
  <title>Aethos — Carbon + Amber lockup</title>
  <defs>
    <style>
      .cb-bg { fill: #161514; }
      .cb-mark-stroke { stroke: #f5a524; stroke-width: 2.2; fill: none; }
      .cb-mark-fill { fill: #f5a524; }
      .cb-word { fill: #fafaf7; font-family: 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 34px; letter-spacing: -0.01em; }
      .cb-sub { fill: #a8a29e; font-family: 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; }
    </style>
  </defs>
  <rect class="cb-bg" width="380" height="80" rx="6"/>
  <!-- Mark: a circle with an inset arc — a sun/seal motif. Premium / editorial. -->
  <g transform="translate(36 40)">
    <circle class="cb-mark-stroke" cx="0" cy="0" r="16"/>
    <circle class="cb-mark-fill" cx="0" cy="0" r="5"/>
  </g>
  <!-- Wordmark -->
  <text class="cb-word" x="68" y="46">Aethos</text>
  <!-- Sub-mark -->
  <text class="cb-sub" x="68" y="62">for professional services</text>
</svg>
