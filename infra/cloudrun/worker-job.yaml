apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: aethos-ps-worker
  labels:
    app: aethos-ps
    component: worker
spec:
  template:
    spec:
      # Restart on failure so ephemeral workers self-recover
      taskCount: 1
      template:
        spec:
          maxRetries: 3
          containers:
            - image: gcr.io/${PROJECT_ID}/aethos-ps-api:latest
              # Procrastinate worker entry point — same image, different command.
              # Replaces the prior ARQ command; the queue now lives in Postgres
              # (Supabase) rather than Redis, so DATABASE_URL replaces
              # UPSTASH_REDIS_URL below.
              command:
                - python
                - -m
                - procrastinate
                - --app=app.workers.procrastinate_app.app
                - worker
              resources:
                limits:
                  cpu: "1"
                  memory: 1Gi
              # Same secrets as api-service.yaml — workers need the same env
              env:
                - name: ENVIRONMENT
                  value: production
                - name: DEBUG
                  value: "false"
                # ── Supabase ─────────────────────────────────────────────────
                - name: SUPABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: aethos-ps-secrets
                      key: SUPABASE_URL
                - name: SUPABASE_ANON_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aethos-ps-secrets
                      key: SUPABASE_ANON_KEY
                - name: SUPABASE_SERVICE_ROLE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aethos-ps-secrets
                      key: SUPABASE_SERVICE_ROLE_KEY
                - name: SUPABASE_JWT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: aethos-ps-secrets
                      key: SUPABASE_JWT_SECRET
                # ── Stripe ───────────────────────────────────────────────────
                - name: STRIPE_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aethos-ps-secrets
                      key: STRIPE_SECRET_KEY
                - name: STRIPE_WEBHOOK_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: aethos-ps-secrets
                      key: STRIPE_WEBHOOK_SECRET
                # ── LLM (OpenRouter — OpenAI-compatible) ─────────────────────
                - name: OPENROUTER_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aethos-ps-secrets
                      key: OPENROUTER_API_KEY
                - name: AGENT_MODELS
                  valueFrom:
                    secretKeyRef:
                      name: aethos-ps-secrets
                      key: AGENT_MODELS
                # ── Resend ───────────────────────────────────────────────────
                - name: RESEND_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aethos-ps-secrets
                      key: RESEND_API_KEY
                # ── Langfuse ─────────────────────────────────────────────────
                - name: LANGFUSE_PUBLIC_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aethos-ps-secrets
                      key: LANGFUSE_PUBLIC_KEY
                - name: LANGFUSE_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aethos-ps-secrets
                      key: LANGFUSE_SECRET_KEY
                # ── Queue (Procrastinate on Postgres / Supabase) ──────────────
                # Postgres direct connection string for the task queue. Use the
                # Supabase SESSION pooler (5432) — transaction pooler (6543)
                # does not support LISTEN/NOTIFY which Procrastinate relies on.
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: aethos-ps-secrets
                      key: DATABASE_URL
