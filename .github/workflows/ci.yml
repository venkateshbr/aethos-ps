name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── 1. Backend lint ────────────────────────────────────────────────────────
  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Run ruff
        run: uv run ruff check backend/

  # ── 2. Backend tests ───────────────────────────────────────────────────────
  backend-test:
    name: Backend tests (unit + property)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Run pytest (unit + property only — no DB required)
        working-directory: backend
        run: |
          uv run pytest tests/unit/ tests/property/ -v --tb=short

  # ── 3. Frontend lint ───────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend lint (ng lint)
    runs-on: ubuntu-latest
    # Only run when frontend/ files are touched
    if: |
      contains(toJson(github.event.commits[*].modified), 'frontend/') ||
      contains(toJson(github.event.commits[*].added), 'frontend/') ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Check frontend package.json exists
        id: check_pkg
        run: |
          if [ -f frontend/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check_pkg.outputs.exists == 'true'
        working-directory: frontend
        run: npm ci
        continue-on-error: true

      - name: Run ng lint
        if: steps.check_pkg.outputs.exists == 'true'
        working-directory: frontend
        run: npx ng lint
        continue-on-error: true

  # ── 4. Frontend build ──────────────────────────────────────────────────────
  frontend-build:
    name: Frontend build (production)
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits[*].modified), 'frontend/') ||
      contains(toJson(github.event.commits[*].added), 'frontend/') ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Check frontend package.json exists
        id: check_pkg
        run: |
          if [ -f frontend/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check_pkg.outputs.exists == 'true'
        working-directory: frontend
        run: npm ci
        continue-on-error: true

      - name: Build (production)
        if: steps.check_pkg.outputs.exists == 'true'
        working-directory: frontend
        run: npx ng build --configuration=production
        continue-on-error: true
