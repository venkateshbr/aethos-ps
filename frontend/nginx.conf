# frontend/nginx.conf — Nginx config for the Aethos PS SPA container
#
# Architecture (Docker prod):
#   Browser → nginx:80 → static SPA files (Angular)
#                      → /api/* proxy → backend container (api:8080)
#
# Using nginx as a reverse proxy for /api keeps everything on a single
# origin, so no CORS headers are needed for authenticated API calls.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/wasm image/svg+xml;
    gzip_min_length 1024;

    # ── API proxy ─────────────────────────────────────────────────────────
    # Forwards /api/* and /health to the backend container on the Docker
    # internal network. The backend service name in docker-compose is "api"
    # and it listens on 8080 inside the container.
    location /api/ {
        proxy_pass         http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;  # allow for LLM extraction calls (5-30s)
        proxy_send_timeout 120s;
    }

    location /health {
        proxy_pass http://api:8080/health;
    }

    # ── Static assets ─────────────────────────────────────────────────────
    # Cache immutable hashed assets (Angular outputs content-hashed filenames)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health probe endpoint for the Docker HEALTHCHECK (nginx-local, not backend)
    location = /health.txt {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────
    # All other routes serve index.html; Angular router handles client-side.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
