name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── 1. Backend lint ────────────────────────────────────────────────────────
  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Run ruff
        working-directory: backend
        run: uv run ruff check app/ tests/

  # ── 2. Backend tests ───────────────────────────────────────────────────────
  backend-test:
    name: Backend tests (unit + property)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Run pytest (unit + property only — no DB required)
        working-directory: backend
        run: |
          uv run pytest tests/unit/ tests/property/ -v --tb=short

  # ── 3. Frontend checks ─────────────────────────────────────────────────────
  # Angular lint is tracked separately because this workspace has no lint
  # target. Typecheck, unit, and Playwright discovery are mandatory meanwhile.
  frontend-check:
    name: Frontend typecheck + unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20.19
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Check frontend package.json exists
        id: check_pkg
        run: |
          if [ -f frontend/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check_pkg.outputs.exists == 'true'
        working-directory: frontend
        run: npm ci

      - name: Typecheck both applications and specs
        if: steps.check_pkg.outputs.exists == 'true'
        working-directory: frontend
        run: npm run typecheck

      - name: Run frontend unit tests
        if: steps.check_pkg.outputs.exists == 'true'
        working-directory: frontend
        run: npm run test:ci

      - name: Validate Playwright discovery
        if: steps.check_pkg.outputs.exists == 'true'
        working-directory: frontend
        run: npx playwright test --list --reporter=line

  # ── 4. Frontend build ──────────────────────────────────────────────────────
  frontend-build:
    name: Frontend build (production)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20.19
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Check frontend package.json exists
        id: check_pkg
        run: |
          if [ -f frontend/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check_pkg.outputs.exists == 'true'
        working-directory: frontend
        run: npm ci

      - name: Build both applications (production)
        if: steps.check_pkg.outputs.exists == 'true'
        working-directory: frontend
        run: npm run build:all
