# frontend/nginx.conf — Nginx config for the Aethos PS SPA container
#
# Serves the Angular SPA on port 80.
# All routes fall through to index.html so Angular's client-side router works.
# API calls (/api/*, /health) are proxied to the backend container.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/wasm image/svg+xml;
    gzip_min_length 1024;

    # Cache immutable hashed assets (angular outputs content-hashed filenames)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health probe endpoint for the Docker HEALTHCHECK
    location = /health.txt {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback — all other routes serve index.html
    # Angular router handles the rest client-side.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
