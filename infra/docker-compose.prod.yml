# infra/docker-compose.prod.yml — Aethos PS production containers
#
# Services:
#   api       — FastAPI backend             (host port 8011)
#   worker    — Procrastinate task worker   (no port — internal only)
#   frontend  — Nginx-served main SPA       (host port 4201)
#   timesheet — Nginx-served portal         (host port 4202)
#
# The worker reuses the same aethos-ps-api image (no extra build) and runs
# the Procrastinate worker process instead of uvicorn.  It needs DATABASE_URL
# in the env file to connect directly to Postgres for the job queue.
#
# Usage:
#   ./start-prod.sh    ← builds + starts all containers
#   ./stop-prod.sh     ← tears them down
#
# The start/stop scripts pass the selected absolute secret-file path through
# AETHOS_ENV_FILE. Direct repo-root validation falls back to .env.

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: aethos-ps-api:latest
    container_name: aethos-ps-api
    restart: unless-stopped
    ports:
      - "8011:8080"      # host:container — Dockerfile exposes 8080
    env_file:
      - ${AETHOS_ENV_FILE:-.env}
    environment:
      - PORT=8080
      - ENVIRONMENT=production
      - DEBUG=false
      - QUEUE_DB_POOL_MIN_SIZE=1
      - QUEUE_DB_POOL_MAX_SIZE=1
      - QUEUE_DB_APPLICATION_NAME=aethos-ps-local-prod-api
      - QUEUE_REQUIRED=true
    healthcheck:
      test: ["CMD", "python", "-c",
             "import json, urllib.request; data=json.load(urllib.request.urlopen('http://localhost:8080/health/ready')); raise SystemExit(0 if data.get('status') == 'ready' else 1)"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - aethos-ps

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    image: aethos-ps-frontend:latest
    container_name: aethos-ps-frontend
    restart: unless-stopped
    ports:
      - "4201:80"        # host:container — nginx serves on 80
    environment:
      # Angular compiled at build time; API_URL must match where the
      # api container is reachable from the browser (the host's IP/domain).
      # Override at build time via --build-arg or bake into environment.prod.ts.
      - API_URL=${API_URL:-https://aethos-api.ishirock.com}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - aethos-ps

  # Procrastinate background worker — same image as api, different entrypoint.
  # Handles: document extraction, billing-run jobs, collections, FX refresh.
  # Requires DATABASE_URL in the env file for direct Postgres queue access.
  worker:
    image: aethos-ps-api:latest   # built by the api service above — no extra build
    container_name: aethos-ps-worker
    restart: unless-stopped
    command: >
      python -m procrastinate
      --app=app.workers.procrastinate_app.app
      worker
      --queues=default,extraction,cron,billing,fx
      --concurrency=4
    env_file:
      - ${AETHOS_ENV_FILE:-.env}
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - QUEUE_DB_POOL_MIN_SIZE=1
      - QUEUE_DB_POOL_MAX_SIZE=2
      - QUEUE_DB_APPLICATION_NAME=aethos-ps-local-prod-worker
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import psycopg, os; psycopg.connect(os.environ['DATABASE_URL']).close()"]
      interval: 60s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - aethos-ps

  # Employee Timesheet Portal — separate SPA, same backend (issue #134).
  timesheet:
    build:
      context: ./frontend
      dockerfile: Dockerfile.timesheet.prod
    image: aethos-ps-timesheet:latest
    container_name: aethos-ps-timesheet
    restart: unless-stopped
    ports:
      - "4202:80"        # host:container — nginx serves on 80
    depends_on:
      api:
        condition: service_healthy
    networks:
      - aethos-ps

networks:
  aethos-ps:
    driver: bridge
